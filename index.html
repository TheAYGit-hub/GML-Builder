<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Blockly GitHub Pages App</title>
        <script src="https://unpkg.com/blockly/blockly.min.js"></script>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                font-family: Arial, sans-serif;
            }
            #header {
                height: 50px;
                background: #222;
                color: white;
                display: flex;
                align-items: center;
                padding: 0 10px;
                gap: 10px;
            }
            button {
                padding: 6px 10px;
                border: none;
                cursor: pointer;
                border-radius: 4px;
            }
            #blocklyDiv {
                height: calc(100% - 50px);
                width: 100%;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <button onclick="exportCode()">Export</button>
            <span id="output"></span>
        </div>
        <div id="blocklyDiv"></div>
        <xml id="toolbox" style="display: none">
            <category name="Control">
                <category name="Logic" colour="210">
                    <block type="logic_if"></block>
                    <sep gap="8"></sep>
                    <block type="logic_if_else"></block>
                    <sep gap="8"></sep>
                    <block type="logic_if_report"></block>
                    <block type="logic_operator">
                        <field name="operator">(_ &&</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_operator">
                        <field name="operator">(_ ||</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_operator">
                        <field name="operator">bool(_ ^</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_not"></block>
                    <block type="logic_bool">
                        <field name="bool">true</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_bool">
                        <field name="bool">false</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_bool">
                        <field name="bool">undefined</field>
                    </block>
                    <block type="logic_is_bool"></block>
                    <sep gap="8"></sep>
                    <block type="logic_to_bool"></block>
                </category>
                <category name="Loops" colour="120">
                    <block type="loops_always"></block>
                    <sep gap="8"></sep>
                    <block type="loops_repeat"></block>
                    <sep gap="8"></sep>
                    <block type="loops_forever"></block>
                    <sep gap="8"></sep>
                    <block type="loops_break"></block>
                    <block type="loops_on_start"></block>
                    <sep gap="8"></sep>
                    <block type="loops_while_until">
                        <field name="act">while</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="loops_while_until">
                        <field name="act">until</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="loops_continue"></block>
                </category>
                <category name="Comparison" colour="#a9a9a9">
                    <block type="comparison_switch"></block>
                    <sep gap="8"></sep>
                    <block type="comparison_case"></block>
                    <sep gap="8"></sep>
                    <block type="comparison_default"></block>
                    <block type="comparison_operator">
                        <field name="operator">&lt;</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="comparison_operator">
                        <field name="operator">==</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="comparison_operator">
                        <field name="operator">&gt;</field>
                    </block>
                </category>
            </category>
            <category name="Variables">
                <category name="Basic Vars" colour="330">
                    <block type="bvariables_create"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_create_scope"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_delete"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_exists"></block>
                    <block type="bvariables_set"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_change"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_get"></block>
                </category>
            </category>
        </xml>
        <script>
            const gmlGenerator = new Blockly.Generator('GML');
            const workspace = Blockly.inject('blocklyDiv', {
                toolbox: document.getElementById('toolbox')
            });
            const deprecatedImage = "data:image/svg+xml;base64,PHN2ZyB2ZXJzaW9uPSIxLjEiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyIgeG1sbnM6eGxpbms9Imh0dHA6Ly93d3cudzMub3JnLzE5OTkveGxpbmsiIHdpZHRoPSIxNDAuMTg4NjYiIGhlaWdodD0iMzUuMzM3ODciIHZpZXdCb3g9IjAsMCwxNDAuMTg4NjYsMzUuMzM3ODciPjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKC0xNjkuOTA1NjcsLTE2NC43NTUxMikiPjxnIHN0cm9rZT0ibm9uZSIgc3Ryb2tlLW1pdGVybGltaXQ9IjEwIj48cGF0aCBkPSJNMTc2LjM4Nzk3LDIwMC4wOTI5OWMtMy41ODAwNywwIC02LjQ4MjMsLTMuNDAxOTkgLTYuNDgyMywtNy41OTg1OHYtMTUuODYyOThjMCwtNC4xOTY1OCAyLjkwMjIyLC03LjU5ODU3IDYuNDgyMywtNy41OTg1N2gxMjcuMjI0MDdjMy41ODAwOCwwIDYuNDgyMywzLjQwMTk5IDYuNDgyMyw3LjU5ODU3djE1Ljg2Mjk4YzAsNC4xOTY1OCAtMi45MDIyMiw3LjU5ODU4IC02LjQ4MjMsNy41OTg1OHoiIGZpbGwtb3BhY2l0eT0iMC42OTQxMiIgZmlsbD0iIzNmMTAxOCIgc3Ryb2tlLXdpZHRoPSIwIi8+PHBhdGggZD0iTTE3Ni4zODc5NywxOTUuODE1MjVjLTMuNTgwMDcsMCAtNi40ODIzLC0zLjQwMiAtNi40ODIzLC03LjU5ODU4di0xNS44NjI5N2MwLC00LjE5NjU4IDIuOTAyMjIsLTcuNTk4NTggNi40ODIzLC03LjU5ODU4aDEyNy4yMjQwN2MzLjU4MDA3LDAgNi40ODIzLDMuNDAyIDYuNDgyMyw3LjU5ODU4djE1Ljg2Mjk3YzAsNC4xOTY1OCAtMi45MDIyMiw3LjU5ODU4IC02LjQ4MjMsNy41OTg1OHoiIGZpbGw9IiM4ODIyMzMiIHN0cm9rZS13aWR0aD0iMCIvPjx0ZXh0IHRyYW5zZm9ybT0idHJhbnNsYXRlKDE3Ni43Njg5MSwxODUuNzY4NzUpIHNjYWxlKDAuNSwwLjUpIHNrZXdYKC0xNS42MDQwNCkiIGZvbnQtc2l6ZT0iNDAiIHhtbDpzcGFjZT0icHJlc2VydmUiIGZpbGw9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMSIgZm9udC1mYW1pbHk9IlNhbnMtU2VyaWYiIGZvbnQtd2VpZ2h0PSJub3JtYWwiIHRleHQtYW5jaG9yPSJzdGFydCI+PHRzcGFuIHg9IjAiIGR5PSIwIj5kZXByZWNhdGVkPC90c3Bhbj48L3RleHQ+PC9nPjwvZz48L3N2Zz48IS0tcm90YXRpb25DZW50ZXI6NzAuMDk0MzMwMDY1MDg3Njk6MTUuMjQ0ODgwNDA3NjA3NDExLS0+"
            Blockly.Blocks['logic_if'] = {
                init: function() {
                    this.appendValueInput("cond").setCheck("Boolean").appendField("if")
                    this.appendStatementInput("statement")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true)
                    this.setColour(210)
                }
            }
            Blockly.Blocks['logic_if_else'] = {
                init: function() {
                    this.appendValueInput("cond").setCheck("Boolean").appendField("if")
                    this.appendStatementInput("statement")
                    this.appendDummyInput().appendField("else")
                    this.appendStatementInput("elseStatement")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true)
                    this.setColour(210)
                }
            }
            Blockly.Blocks['logic_if_report'] = {
                init: function() {
                    this.appendValueInput("cond").setCheck("Boolean").appendField("if")
                    this.appendValueInput("valueA").appendField("then")
                    this.appendValueInput("valueB").appendField("else")
                    this.setOutput(true)
                    this.setInputsInline(true)
                    this.setColour(210)
                }
            }
            Blockly.Blocks['logic_operator'] = {
                init: function() {
                    this.appendValueInput("valueA").setCheck("Boolean")
                    this.appendDummyInput().appendField(new Blockly.FieldDropdown([
                        ["and","(_ &&"],
                        ["or","(_ ||"],
                        ["xor","bool(_ ^"],
                        ["nand","!(_ &&"],
                        ["nor","!(_ ||"],
                        ["xnor","!bool(_ ^"]
                    ]), "operator")
                    this.appendValueInput("valueB").setCheck("Boolean")
                    this.setOutput(true, "Boolean")
                    this.setInputsInline(true)
                    this.setColour(210)
                }
            }
            Blockly.Blocks['logic_not'] = {
                init: function() {
                    this.appendValueInput("value").appendField("not")
                    this.setOutput(true, "Boolean")
                    this.setColour(210)
                }
            }
            Blockly.Blocks['logic_bool'] = {
                init: function() {
                    this.appendDummyInput().appendField(new Blockly.FieldDropdown([
                        ["true","true"],
                        ["false","false"],
                        ["undefined","undefined"]
                    ]), "bool")
                    this.setOutput(true, "Boolean")
                    this.setColour(210)
                }
            }
            Blockly.Blocks['logic_is_bool'] = {
                init: function() {
                    this.appendValueInput("value").appendField("is")
                    this.appendDummyInput().appendField("a boolean?")
                    this.setOutput(true, "Boolean")
                    this.setInputsInline(true)
                    this.setColour(210)
                }
            }
            Blockly.Blocks['logic_to_bool'] = {
                init: function() {
                    this.appendValueInput("value").appendField("convert")
                    this.appendDummyInput().appendField("to boolean")
                    this.setOutput(true, "Boolean")
                    this.setInputsInline(true)
                    this.setColour(210)
                }
            }
            Blockly.Blocks['loops_always'] = {
                init: function() {
                    this.appendDummyInput().appendField("always")
                    this.setNextStatement(true, "Block")
                    this.setColour(120)
                }
            }
            Blockly.Blocks['loops_repeat'] = {
                init: function() {
                    this.appendValueInput("times").setCheck("Number").appendField("repeat")
                    this.appendStatementInput("statement")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(120)
                }
            }
            Blockly.Blocks['loops_forever'] = {
                init: function() {
                    this.appendDummyInput().appendField("forever")
                    this.appendStatementInput("statement")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(120)
                }
            }
            Blockly.Blocks['loops_break'] = {
                init: function() {
                    this.appendDummyInput().appendField("break")
                    this.setPreviousStatement(true, "Block")
                    this.setColour(120)
                }
            }
            Blockly.Blocks['loops_on_start'] = {
                init: function() {
                    this.appendDummyInput().appendField("on start")
                    this.setNextStatement(true, "Block")
                    this.setColour(120)
                }
            }
            Blockly.Blocks['loops_while_until'] = {
                init: function() {
                    this.appendValueInput("cond").setCheck("Boolean").appendField(new Blockly.FieldDropdown([
                        ["while","while"],
                        ["until","until"],
                    ]), "act")
                    this.appendStatementInput("statement")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(120)
                }
            }
            Blockly.Blocks['loops_continue'] = {
                init: function() {
                    this.appendDummyInput().appendField("continue")
                    this.setPreviousStatement(true, "Block")
                    this.setColour(120)
                }
            }
            Blockly.Blocks['comparison_switch'] = {
                init: function() {
                    this.appendValueInput("value").appendField("switch")
                    this.appendStatementInput("cases").setCheck("Case")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true)
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['comparison_case'] = {
                init: function() {
                    this.appendValueInput("value").appendField("case")
                    this.appendStatementInput("statement")
                    this.setPreviousStatement(true, "Case")
                    this.setNextStatement(true, "Case")
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['comparison_default'] = {
                init: function() {
                    this.appendDummyInput().appendField("default")
                    this.appendStatementInput("statement")
                    this.setPreviousStatement(true, "Case")
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['comparison_operator'] = {
                init: function() {
                    this.appendValueInput("valueA")
                    this.appendDummyInput().appendField(new Blockly.FieldDropdown([
                        ["<", "<"],
                        ["=", "=="],
                        [">", ">"],
                        ["≤", "<="],
                        ["≠", "!="],
                        ["≥", ">="]
                    ]), "operator")
                    this.appendValueInput("valueB")
                    this.setOutput(true, "Boolean")
                    this.setInputsInline(true)
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['comparison_set_epsilon'] = {
                init: function() {
                    this.appendValueInput('value').setCheck("Number").appendField('set epsilon to')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(330)
                }
            }
            Blockly.Blocks['bvariables_create'] = {
                init: function() {
                    this.appendDummyInput().appendField('create var').appendField(new Blockly.FieldTextInput('variable'), 'varname');
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(330)
                }
            }
            Blockly.Blocks['bvariables_create_scope'] = {
                init: function() {
                    this.appendDummyInput().appendField('create scope var').appendField(new Blockly.FieldTextInput('variable'), 'varname');
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(330)
                }
            }
            Blockly.Blocks['bvariables_delete'] = {
                init: function() {
                    this.appendDummyInput().appendField('delete var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(330)
                }
            }
            Blockly.Blocks['bvariables_exists'] = {
                init: function() {
                    this.appendDummyInput().appendField('var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('exists?')
                    this.setOutput(true, "Boolean")
                    this.setColour(330)
                }
            }
            Blockly.Blocks['bvariables_set'] = {
                init: function() {
                    this.appendValueInput('value').appendField('set var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('to')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(330)
                }
            }
            Blockly.Blocks['bvariables_change'] = {
                init: function() {
                    this.appendValueInput('value').setCheck("Number").appendField('change var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('by')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour(330)
                }
            }
            Blockly.Blocks['bvariables_get'] = {
                init: function() {
                    this.appendDummyInput().appendField('get var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setOutput(true, "Number")
                    this.setColour(330)
                }
            }
            gmlGenerator.forBlock['logic_if'] = function(block) {
                const cond = gmlGenerator.valueToCode(block, 'cond', 0) || 'false'
                const statement = gmlGenerator.statementToCode(block, 'statement')
                if (block.outputConnection && block.outputConnection.isConnected()) {
                    return [`(${cond} ? (function () {\n${statement}})() : undefined)`, 0]
                }
                return `if (${cond}) {\n${statement}}\n`
            }
            gmlGenerator.forBlock['logic_if_else'] = function(block) {
                const cond = gmlGenerator.valueToCode(block, 'cond', 0) || 'false'
                const statement = gmlGenerator.statementToCode(block, 'statement')
                const elseStatement = gmlGenerator.statementToCode(block, 'elseStatement')
                if (block.outputConnection && block.outputConnection.isConnected()) {
                    return [`(${cond} ? (function () {\n${statement}})() : (function () {\n${elseStatement}})())`, 0]
                }
                return `if (${cond}) {\n${statement}} else {\n${elseStatement}}\n`
            }
            gmlGenerator.forBlock['logic_if_report'] = function(block) {
                const cond = gmlGenerator.valueToCode(block, 'cond', 0) || 'false'
                const valueA = gmlGenerator.valueToCode(block, 'valueA', 0) || 'false'
                const valueB = gmlGenerator.valueToCode(block, 'valueB', 0) || 'false'
                return [`(${cond} ? ${valueA} : ${valueB})`, 0]
            }
            gmlGenerator.forBlock['logic_operator'] = function(block) {
                const valueA = gmlGenerator.valueToCode(block, 'valueA', 0) || 'false'
                const operator = block.getFieldValue('operator').split('_')
                const valueB = gmlGenerator.valueToCode(block, 'valueB', 0) || 'false'
                return [operator[0] + valueA + operator[1] + valueB + ' )', 0]
            }
            gmlGenerator.forBlock['logic_not'] = (block) => [`!(${gmlGenerator.valueToCode(block, 'value', 0) || 'false'})`, 0]
            gmlGenerator.forBlock['logic_bool'] = (block) => [block.getFieldValue('bool'), 0]
            gmlGenerator.forBlock['logic_is_bool'] = (block) => [`is_bool(${gmlGenerator.valueToCode(block, 'value', 0) || 'undefined'})`, 0]
            gmlGenerator.forBlock['logic_to_bool'] = (block) => [`bool(${gmlGenerator.valueToCode(block, 'value', 0) || 'undefined'})`, 0]
            gmlGenerator.forBlock['loops_always'] = function(block) {
                const nextCode = gmlGenerator.blockToCode(block.getNextBlock())
                return `while true {\n${nextCode}}\n`
            }
            gmlGenerator.forBlock['loops_on_start'] = (block) => gmlGenerator.blockToCode(block.getNextBlock())
            gmlGenerator.forBlock['loops_repeat'] = function(block) {
                const times = gmlGenerator.valueToCode(block, 'times', 0) || '0'
                const statement = gmlGenerator.statementToCode(block, 'statement')
                return `repeat (${times}) {\n${statement}}\n`
            }
            gmlGenerator.forBlock['loops_forever'] = function(block) {
                const statement = gmlGenerator.statementToCode(block, 'statement') || '0'
                return `while true {\n${statement}}\n`
            }
            gmlGenerator.forBlock['loops_while_until'] = function(block) {
                const cond = gmlGenerator.valueToCode(block, 'cond', 0) || 'false'
                const act = block.getFieldValue('act')
                const statement = gmlGenerator.statementToCode(block, 'statement')
                if (act === 'while') {
                    return `while (${cond}) {\n${statement}}\n`
                } else {
                    return `while (!(${cond})) {\n${statement}}\n`
                }
            }
            gmlGenerator.forBlock['loops_break'] = () => 'break\n'
            gmlGenerator.forBlock['loops_continue'] = () => 'continue\n'
            function runCode() {
                const code = Blockly.JavaScript.workspaceToCode(workspace);
                console.log(code);
                try {
                    eval(code);
                    document.getElementById("output").textContent = "Ran successfully";
                } catch (e) {
                    document.getElementById("output").textContent = "Error: " + e;
                }
            }
            gmlGenerator.forBlock['comparison_switch'] = function(block) {
                const value = gmlGenerator.valueToCode(block, 'value', 0) || 'undefined'
                const statement = gmlGenerator.statementToCode(block, 'cases')
                if (block.outputConnection && block.outputConnection.isConnected()) {
                    return [`(switch(${value}) {\n${statement}})()`, 0]
                }
                return `switch (${value}) {\n${statement}}\n`
            }
            gmlGenerator.forBlock['comparison_case'] = function(block) {
                const value = gmlGenerator.valueToCode(block, 'value', 0) || 'undefined'
                const statement = gmlGenerator.statementToCode(block, 'statement')
                return `case ${value}:\n${statement}\n`
            }
            gmlGenerator.forBlock['comparison_default'] = function(block) {
                const statement = gmlGenerator.statementToCode(block, 'statement')
                return `default:\n${statement}\n`
            }
            gmlGenerator.forBlock['comparison_operator'] = function(block) {
                const valueA = gmlGenerator.valueToCode(block, 'valueA', 0) || 'false'
                const operator = block.getFieldValue('operator')
                const valueB = gmlGenerator.valueToCode(block, 'valueB', 0) || 'false'
                return [`(${valueA} ${operator} ${valueB})`, 0]
            }
            function varSuit(text) {
                return text.replace(/[^a-zA-Z0-9_]/g, '_')
            }
            gmlGenerator.forBlock['bvariables_create'] = (block) => `${varSuit(block.getFieldValue('varname'))} = undefined\n`
            gmlGenerator.forBlock['bvariables_create_scope'] = (block) => `let ${varSuit(block.getFieldValue('varname'))} = undefined\n`
            gmlGenerator.forBlock['bvariables_delete'] = (block) => `delete ${varSuit(block.getFieldValue('varname'))}\n`
            gmlGenerator.forBlock['bvariables_exists'] = (block) => `variable_instance_exists(id, ${varSuit(block.getFieldValue('varname'))})`  
            gmlGenerator.forBlock['bvariables_set'] = function(block) {
                const varname = varSuit(block.getFieldValue('varname'))
                const value = gmlGenerator.valueToCode(block, 'value', 0) || 'undefined'
                return `${varname} = ${value}\n`
            }
            gmlGenerator.forBlock['bvariables_change'] = function(block) {
                const varname = varSuit(block.getFieldValue('varname'))
                const value = gmlGenerator.valueToCode(block, 'value', 0) || 'undefined'
                return `${varname} += ${value}\n`
            }
            gmlGenerator.forBlock['bvariables_get'] = (block) => varSuit(block.getFieldValue('varname'))
            function exportCode() {
                const code = gmlGenerator.workspaceToCode(workspace);
                const blob = new Blob([code], {type: "text/plain"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "code.gml";
                a.click();
                URL.revokeObjectURL(url);
            }
        </script>
    </body>
</html>
