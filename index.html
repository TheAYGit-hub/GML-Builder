<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Blockly Modular App</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial;
        }

        #header {
            height: 50px;
            background: #222;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 10px;
        }

        #blocklyDiv {
            height: calc(100% - 50px);
            width: 100%;
        }
    </style>
</head>
<body>

<div id="header">
    <button onclick="runCode()">Run</button>
    <button onclick="saveBlocks()">Save</button>
    <button onclick="loadBlocks()">Load</button>
    <span id="output"></span>
</div>

<div id="blocklyDiv"></div>

<xml id="toolbox" style="display:none">
    <category name="Logic" colour="210">
        <block type="logic_if"></block>
        <block type="logic_boolean"></block>
    </category>
</xml>

<script type="module" src="main.js"></script>

</body>
</html>
