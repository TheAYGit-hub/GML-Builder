<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Blockly GitHub Pages App</title>
        <script src="https://unpkg.com/blockly/blockly.min.js"></script>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                font-family: Arial, sans-serif;
            }
            #header {
                height: 50px;
                background: #222;
                color: white;
                display: flex;
                align-items: center;
                padding: 0 10px;
                gap: 10px;
            }
            button {
                padding: 6px 10px;
                border: none;
                cursor: pointer;
                border-radius: 4px;
            }
            #blocklyDiv {
                height: calc(100% - 50px);
                width: 100%;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <button onclick="saveBlocks()">Save</button>
            <button onclick="loadBlocks()">Load</button>
            <button onclick="exportCode()">Export</button>
            <button onclick="workspace.clear()">Clear</button>
            <span id="output"></span>
        </div>
        <div id="blocklyDiv"></div>
        <xml id="toolbox" style="display: none">
            <category name="Control">
                <category name="Logic" colour="#4c97ff">
                    <block type="logic_if"></block>
                    <sep gap="8"></sep>
                    <block type="logic_if_else"></block>
                    <sep gap="8"></sep>
                    <block type="logic_if_report"></block>
                    <block type="logic_operator">
                        <field name="operator">(~ &&</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_operator">
                        <field name="operator">(~ ||</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_operator">
                        <field name="operator">bool(~ ^</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_not"></block>
                    <block type="logic_bool">
                        <field name="bool">true</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_bool">
                        <field name="bool">false</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="logic_bool">
                        <field name="bool">undefined</field>
                    </block>
                    <block type="logic_is_bool"></block>
                    <sep gap="8"></sep>
                    <block type="logic_to_bool"></block>
                </category>
                <category name="Loops" colour="#0fbd8c">
                    <block type="loops_always"></block>
                    <sep gap="8"></sep>
                    <block type="loops_repeat"></block>
                    <sep gap="8"></sep>
                    <block type="loops_forever"></block>
                    <sep gap="8"></sep>
                    <block type="loops_break"></block>
                    <block type="loops_on_start"></block>
                    <sep gap="8"></sep>
                    <block type="loops_while_until">
                        <field name="act">while</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="loops_while_until">
                        <field name="act">until</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="loops_continue"></block>
                </category>
                <category name="Comparison" colour="#a9a9a9">
                    <block type="comparison_switch"></block>
                    <sep gap="8"></sep>
                    <block type="comparison_case"></block>
                    <sep gap="8"></sep>
                    <block type="comparison_default"></block>
                    <block type="comparison_operator">
                        <field name="operator">&lt;</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="comparison_operator">
                        <field name="operator">==</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="comparison_operator">
                        <field name="operator">&gt;</field>
                    </block>
                    <block type="comparison_set_epsilon"></block>
                    <sep gap="8"></sep>
                    <block type="comparison_get_epsilon"></block>
                </category>
            </category>
            <category name="Variables">
                <category name="Basic Vars" colour="#ff8c1a">
                    <block type="bvariables_create"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_create_scope"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_delete"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_exists"></block>
                    <block type="bvariables_set"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_change"></block>
                    <sep gap="8"></sep>
                    <block type="bvariables_get"></block>
                </category>
                <category name="Global Vars" colour="#6218ed">
                    <block type="gvariables_create"></block>
                    <sep gap="8"></sep>
                    <block type="gvariables_delete"></block>
                    <sep gap="8"></sep>
                    <block type="gvariables_exists"></block>
                    <block type="gvariables_set"></block>
                    <sep gap="8"></sep>
                    <block type="gvariables_change"></block>
                    <sep gap="8"></sep>
                    <block type="gvariables_get"></block>
                    <block type="gvariables_global_struct"></block>
                </category>
                <category name="Instance Vars" colour="#ec3b59">
                    <block type="ivariables_create"></block>
                    <sep gap="8"></sep>
                    <block type="ivariables_delete"></block>
                    <sep gap="8"></sep>
                    <block type="ivariables_exists"></block>
                    <block type="ivariables_set"></block>
                    <sep gap="8"></sep>
                    <block type="ivariables_change"></block>
                    <sep gap="8"></sep>
                    <block type="ivariables_get"></block>
                </category>
                <category name="Functions" colour="#ff6680">
                    <block type="functions_create"></block>
                    <sep gap="8"></sep>
                    <block type="functions_create_inputs"></block>
                    <sep gap="8"></sep>
                    <block type="functions_return"></block>
                    <block type="functions_execute"></block>
                </category>
            </category>
            <category name="Outputs">
                <category name="Strings" colour="#ffbf00">
                    <block type="strings_create"></block>
                </category>
                <category name="Numbers" colour="#59c059">
                    <block type="numbers_create"></block>
                    <block type="numbers_operator">
                        <field name="operator">(~ + ~)</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="numbers_operator">
                        <field name="operator">(~ - ~)</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="numbers_operator">
                        <field name="operator">(~ * ~)</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="numbers_operator">
                        <field name="operator">(~ / ~)</field>
                    </block>
                    <block type="numbers_average">
                        <field name="operator">array_reduce(~, min)</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="numbers_average">
                        <field name="operator">array_reduce(~, max)</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="numbers_average">
                        <field name="operator">(array_reduce(~, function(a, b) {return a + b}) / array_length(~))</field>
                    </block>
                    <block type="numbers_function">
                        <field name="operator">abs</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="numbers_round">
                        <field name="operator">round</field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="numbers_round_precision">
                        <field name="operator">round</field>
                    </block>
                    <block type="numbers_random">
                        <field name="type"></field>
                    </block>
                    <sep gap="8"></sep>
                    <block type="numbers_random_range">
                        <field name="type"></field>
                    </block>
                    <block type="numbers_set_seed"></block>
                    <sep gap="8"></sep>
                    <block type="numbers_randomize_seed"></block>
                    <sep gap="8"></sep>
                    <block type="numbers_get_seed"></block>
                    <block type="numbers_is_number"></block>
                    <sep gep="8"></sep>
                    <block type="numbers_to_number"></block>
                </category>
                <category name="Geometry" colour="#6babff">
                    <block type="geometry_2d_vector"></block>
                    <sep gap="8"></sep>
                    <block type="geometry_3d_vector"></block>
                </category>
                <category name="Matrices" colour="#c2d916">

                </category>
                <category name="Date & Time" colour="#59c074">

                </category>
                <category name="Arrays" colour="#ff661a">

                </category>
                <category name="Structs" colour="#748bee">

                </category>
            </category>
        </xml>
        <script>
            console.log(document.getElementById('toolbox'))
        </script>
        <script>
            const gmlGenerator = new Blockly.Generator('GML')
            const workspace = Blockly.inject('blocklyDiv', {
                toolbox: document.getElementById('toolbox')
            })
            Blockly.Blocks['logic_if'] = {
                init: function() {
                    this.appendValueInput("cond").setCheck("Boolean").appendField("if")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true)
                    this.setColour("#4c97ff")
                    Blockly.Extensions.apply('hydra_toggle_next', this, false)
                }
            }
            Blockly.Blocks['logic_if_else'] = {
                init: function() {
                    this.appendValueInput("cond").setCheck("Boolean").appendField("if")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.appendDummyInput().appendField("else")
                    this.appendStatementInput("elseStatement")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true)
                    this.setColour("#4c97ff")
                    Blockly.Extensions.apply('hydra_toggle_next', this, false)
                }
            }
            Blockly.Blocks['logic_if_report'] = {
                init: function() {
                    this.appendValueInput("cond").setCheck("Boolean").appendField("if")
                    this.appendValueInput("valueA").appendField("then")
                    this.appendValueInput("valueB").appendField("else")
                    this.setOutput(true)
                    this.setInputsInline(true)
                    this.setColour("#4c97ff")
                }
            }
            Blockly.Blocks['logic_operator'] = {
                init: function() {
                    this.appendValueInput("valueA").setCheck("Boolean")
                    this.appendDummyInput().appendField(new Blockly.FieldDropdown([
                        ["and","(~ &&"],
                        ["or","(~ ||"],
                        ["xor","bool(~ ^"],
                        ["nand","!(~ &&"],
                        ["nor","!(~ ||"],
                        ["xnor","!bool(~ ^"]
                    ]), "operator")
                    this.appendValueInput("valueB").setCheck("Boolean")
                    this.setOutput(true, "Boolean")
                    this.setInputsInline(true)
                    this.setColour("#4c97ff")
                }
            }
            Blockly.Blocks['logic_not'] = {
                init: function() {
                    this.appendValueInput("value").appendField("not")
                    this.setOutput(true, "Boolean")
                    this.setColour("#4c97ff")
                }
            }
            Blockly.Blocks['logic_bool'] = {
                init: function() {
                    this.appendDummyInput().appendField(new Blockly.FieldDropdown([
                        ["true","true"],
                        ["false","false"],
                        ["undefined","undefined"]
                    ]), "bool")
                    this.setOutput(true, "Boolean")
                    this.setColour("#4c97ff")
                }
            }
            Blockly.Blocks['logic_is_bool'] = {
                init: function() {
                    this.appendValueInput("value").appendField("is")
                    this.appendDummyInput().appendField("a boolean?")
                    this.setOutput(true, "Boolean")
                    this.setInputsInline(true)
                    this.setColour("#4c97ff")
                }
            }
            Blockly.Blocks['logic_to_bool'] = {
                init: function() {
                    this.appendValueInput("value").appendField("convert")
                    this.appendDummyInput().appendField("to boolean")
                    this.setOutput(true, "Boolean")
                    this.setInputsInline(true)
                    this.setColour("#4c97ff")
                }
            }
            Blockly.Blocks['loops_always'] = {
                init: function() {
                    this.appendDummyInput().appendField("always")
                    this.setNextStatement(true, "Block")
                    this.setColour("#0fbd8c")
                }
            }
            Blockly.Blocks['loops_repeat'] = {
                init: function() {
                    this.appendValueInput("times").setCheck("Number").appendField("repeat")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#0fbd8c")
                }
            }
            Blockly.Blocks['loops_forever'] = {
                init: function() {
                    this.appendDummyInput().appendField("forever")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#0fbd8c")
                }
            }
            Blockly.Blocks['loops_break'] = {
                init: function() {
                    this.appendDummyInput().appendField("break")
                    this.setPreviousStatement(true, "Block")
                    this.setColour("#0fbd8c")
                }
            }
            Blockly.Blocks['loops_on_start'] = {
                init: function() {
                    this.appendDummyInput().appendField("on start")
                    this.setNextStatement(true, "Block")
                    this.setColour("#0fbd8c")
                }
            }
            Blockly.Blocks['loops_while_until'] = {
                init: function() {
                    this.appendValueInput("cond").setCheck("Boolean").appendField(new Blockly.FieldDropdown([
                        ["while","while"],
                        ["until","until"],
                    ]), "act")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#0fbd8c")
                }
            }
            Blockly.Blocks['loops_continue'] = {
                init: function() {
                    this.appendDummyInput().appendField("continue")
                    this.setPreviousStatement(true, "Block")
                    this.setColour("#0fbd8c")
                }
            }
            Blockly.Blocks['comparison_switch'] = {
                init: function() {
                    this.appendValueInput("value").appendField("switch")
                    this.appendStatementInput("cases").setCheck("Case")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true)
                    this.setColour("#a9a9a9")
                    Blockly.Extensions.apply('hydra_toggle_next', this, false)
                }
            }
            Blockly.Blocks['comparison_case'] = {
                init: function() {
                    this.appendValueInput("value").appendField("case")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.setPreviousStatement(true, "Case")
                    this.setNextStatement(true, "Case")
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['comparison_default'] = {
                init: function() {
                    this.appendDummyInput().appendField("default")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.setPreviousStatement(true, "Case")
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['comparison_operator'] = {
                init: function() {
                    this.appendValueInput("valueA")
                    this.appendDummyInput().appendField(new Blockly.FieldDropdown([
                        ["<", "<"],
                        ["=", "=="],
                        [">", ">"],
                        ["≤", "<="],
                        ["≠", "!="],
                        ["≥", ">="]
                    ]), "operator")
                    this.appendValueInput("valueB")
                    this.setOutput(true, "Boolean")
                    this.setInputsInline(true)
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['comparison_set_epsilon'] = {
                init: function() {
                    this.appendValueInput('value').setCheck("Number").appendField('set epsilon to')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['comparison_get_epsilon'] = {
                init: function() {
                    this.appendDummyInput().appendField('get epsilon')
                    this.setOutput(true, "Number")
                    this.setColour("#a9a9a9")
                }
            }
            Blockly.Blocks['bvariables_create'] = {
                init: function() {
                    this.appendDummyInput().appendField('create var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ff8c1a")
                }
            }
            Blockly.Blocks['bvariables_create_scope'] = {
                init: function() {
                    this.appendDummyInput().appendField('create scope var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ff8c1a")
                }
            }
            Blockly.Blocks['bvariables_delete'] = {
                init: function() {
                    this.appendDummyInput().appendField('delete var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ff8c1a")
                }
            }
            Blockly.Blocks['bvariables_exists'] = {
                init: function() {
                    this.appendDummyInput().appendField('var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('exists?')
                    this.setOutput(true, "Boolean")
                    this.setColour("#ff8c1a")
                }
            }
            Blockly.Blocks['bvariables_set'] = {
                init: function() {
                    this.appendValueInput('value').appendField('set var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('to')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ff8c1a")
                }
            }
            Blockly.Blocks['bvariables_change'] = {
                init: function() {
                    this.appendValueInput('value').setCheck("Number").appendField('change var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('by')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ff8c1a")
                }
            }
            Blockly.Blocks['bvariables_get'] = {
                init: function() {
                    this.appendDummyInput().appendField('get var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setOutput(true)
                    this.setColour("#ff8c1a")
                }
            }
            Blockly.Blocks['ivariables_create'] = {
                init: function() {
                    this.appendValueInput('instance').setCheck("Instance").appendField('create var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('at instance')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ec3b59")
                }
            }
            Blockly.Blocks['ivariables_delete'] = {
                init: function() {
                    this.appendValueInput('instance').setCheck("Instance").appendField('delete var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('at instance')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ec3b59")
                }
            }
            Blockly.Blocks['ivariables_exists'] = {
                init: function() {
                    this.appendValueInput('instance').setCheck("Instance").appendField('var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('exists at instance')
                    this.setOutput(true, "Boolean")
                    this.setColour("#ec3b59")
                }
            }
            Blockly.Blocks['ivariables_set'] = {
                init: function() {
                    this.appendValueInput('instance').setCheck("Instance").appendField('set var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('at instance')
                    this.appendValueInput('value').appendField('to')
                    this.setInputsInline(true)
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ec3b59")
                }
            }
            Blockly.Blocks['ivariables_change'] = {
                init: function() {
                    this.appendValueInput('instance').setCheck("Instance").appendField('change var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('at instance')
                    this.appendValueInput('value').appendField('by')
                    this.setInputsInline(true)
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#ec3b59")
                }

            Blockly.Blocks['ivariables_get'] = {
                init: function() {
                    this.appendValueInput('instance').setCheck("Instance").appendField('get var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('from instance')
                    this.setOutput(true)
                    this.setColour("#ec3b59")
                }
            }
            Blockly.Blocks['gvariables_create'] = {
                init: function() {
                    this.appendDummyInput().appendField('create global var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#6218ed")
                }
            }
            Blockly.Blocks['gvariables_delete'] = {
                init: function() {
                    this.appendDummyInput().appendField('delete global var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#6218ed")
                }
            }
            Blockly.Blocks['gvariables_exists'] = {
                init: function() {
                    this.appendDummyInput().appendField('global var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('exists?')
                    this.setOutput(true, "Boolean")
                    this.setColour("#6218ed")
                }
            }
            Blockly.Blocks['gvariables_set'] = {
                init: function() {
                    this.appendValueInput('value').appendField('set global var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('to')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#6218ed")
                }
            }
            Blockly.Blocks['gvariables_change'] = {
                init: function() {
                    this.appendValueInput('value').setCheck("Number").appendField('change global var').appendField(new Blockly.FieldTextInput('variable'), 'varname').appendField('by')
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setColour("#6218ed")
                }
            }
            Blockly.Blocks['gvariables_get'] = {
                init: function() {
                    this.appendDummyInput().appendField('get global var').appendField(new Blockly.FieldTextInput('variable'), 'varname')
                    this.setOutput(true)
                    this.setColour("#6218ed")
                }
            }
            Blockly.Blocks['gvariables_global_struct'] = {
                init: function() {
                    this.appendDummyInput().appendField('global var struct')
                    this.setOutput(true, "Struct")
                    this.setColour("#6218ed")
                }
            }
            Blockly.Blocks['functions_create'] = {
                init: function() {
                    this.appendDummyInput().appendField("function").appendField(new Blockly.FieldTextInput("myFunction"), "name")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true, "Function")
                    this.setColour("#ff6680")
                    Blockly.Extensions.apply('hydra_toggle_next', this, false)

            Blockly.Blocks['functions_create_inputs'] = {
                init: function() {
                    this.appendDummyInput().appendField("function").appendField(new Blockly.FieldTextInput("myFunction"), "name").appendField("inputs").appendField(new Blockly.FieldTextInput("x, y"), "inputs")
                    this.appendStatementInput("statement").setCheck("Block")
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true, "Function")
                    this.setColour("#ff6680")
                    Blockly.Extensions.apply('hydra_toggle_next', this, false)

            }
            Blockly.Blocks['functions_return'] = {
                init: function() {
                    this.appendValueInput("value").appendField("return")
                    this.setPreviousStatement(true, "Block")
                    this.setColour("#ff6680")
                }
            }
            Blockly.Blocks['functions_execute'] = {
                init: function() {
                    this.appendValueInput("func").setCheck("Function").appendField("execute")
                    this.appendValueInput("inputs").setCheck("Array").appendField("inputs")
                    this.setInputsInline(true)
                    this.setPreviousStatement(true, "Block")
                    this.setNextStatement(true, "Block")
                    this.setOutput(true)
                    this.setColour("#ff6680")
                    Blockly.Extensions.apply('hydra_toggle_next', this, false)

            Blockly.Blocks['strings_create'] = {
                init: function() {
                    this.appendDummyInput().appendField('"').appendField(new Blockly.FieldTextInput("text"), "text").appendField('"')
                    this.setOutput(true, "String")
                    this.setColour("#ffbf00")
                }
            }
            Blockly.Blocks['numbers_create'] = {
                init: function() {
                    this.appendDummyInput().appendField('(').appendField(new Blockly.FieldNumber(0), "number").appendField(')')
                    this.setOutput(true, "Number")
                    this.setColour("#59c059")
                }
            }
            Blockly.Blocks['numbers_operator'] = {
                init: function() {
                    this.appendValueInput("valueA").setCheck("Number")

            Blockly.Extensions.register('hydra_toggle_next', function() {
                const update = () => {
                    const hasOutput = this.outputConnection && this.outputConnection.targetConnection
                    if (hasOutput) {
                        if (this.nextConnection) {
                            if (this.nextConnection.isConnected()) {
                                this.nextConnection.disconnect()
                            }
                            this.nextConnection.dispose()
                            this.nextConnection = null
                        }
                    } else {
                        if (!this.nextConnection) {

                        }
                    }
                };
                this.setOnChange(function(event) {
                    if (!this.workspace || this.isInFlyout) return
                    update();
                });
                setTimeout(update, 0)

            function saveBlocks() {
                const xml = Blockly.Xml.workspaceToDom(workspace);

            function loadBlocks() {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "text/xml";
                input.onchange = (event) => {
                    const file = event.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const xmlText = e.target.result;
                        const xml = Blockly.Xml.textToDom(xmlText);
                        workspace.clear();
                        Blockly.Xml.domToWorkspace(xml, workspace);
                    };
                    reader.readAsText(file);
                };
                input.click();
            }
