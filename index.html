<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Blockly GitHub Pages App</title>
        <script src="https://unpkg.com/blockly/blockly.min.js"></script>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                font-family: Arial, sans-serif;
            }
            #header {
                height: 50px;
                background: #222;
                color: white;
                display: flex;
                align-items: center;
                padding: 0 10px;
                gap: 10px;
            }
            button {
                padding: 6px 10px;
                border: none;
                cursor: pointer;
                border-radius: 4px;
            }
            #blocklyDiv {
                height: calc(100% - 50px);
                width: 100%;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <button onclick="saveBlocks()">Save</button>
            <button onclick="loadBlocks()">Load</button>
            <button onclick="exportCode()">Export</button>
            <button onclick="workspace.clear()">Clear</button>
            <span id="output"></span>
        </div>
        <div id="blocklyDiv"></div>
        <xml id="toolbox" style="display: none" src="toolbox.xml"></xml>
        <script type="module">
            const gmlGenerator = new Blockly.Generator('GML')
            const workspace = Blockly.inject('blocklyDiv', {
                toolbox: document.getElementById('toolbox')
            })
            export default workspace
            export {gmlGenerator}
            Blockly.Extensions.register('hydra_toggle_next', function() {
                const update = () => {
                    const hasOutput = this.outputConnection && this.outputConnection.targetConnection
                    if (hasOutput) {
                        if (this.nextConnection) {
                            if (this.nextConnection.isConnected()) {
                                this.nextConnection.disconnect()
                            }
                            this.nextConnection.dispose()
                            this.nextConnection = null
                        }
                    } else {
                        if (!this.nextConnection) {
                            this.setNextStatement(true)
                        }
                    }
                };
                this.setOnChange(function(event) {
                    if (!this.workspace || this.isInFlyout) return
                    update();
                });
                setTimeout(update, 0)
            })
            function saveBlocks() {
                const xml = Blockly.Xml.workspaceToDom(workspace);
                const xmlText = Blockly.Xml.domToPrettyText(xml);
                const blob = new Blob([xmlText], {type: "text/xml"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "blocks.xml";
                a.click();
                URL.revokeObjectURL(url);
            }
            function loadBlocks() {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "text/xml";
                input.onchange = (event) => {
                    const file = event.target.files[0];
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const xmlText = e.target.result;
                        const xml = Blockly.Xml.textToDom(xmlText);
                        workspace.clear();
                        Blockly.Xml.domToWorkspace(xml, workspace);
                    };
                    reader.readAsText(file);
                };
                input.click();
            } 
            function exportCode() {
                const code = gmlGenerator.workspaceToCode(workspace);
                const blob = new Blob([code], {type: "text/plain"});
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "code.gml";
                a.click();
                URL.revokeObjectURL(url);
            }
        </script>
        <script src="blocks/loops.js" type="module"></script>
    </body>
</html>
