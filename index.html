<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>GML-Builder</title>
        <script src="https://unpkg.com/blockly/blockly.min.js"></script>
        <style>
            html, body {
                height: 100%;
                margin: 0;
                font-family: Arial, sans-serif
            }
            #header {
                height: 50px;
                background: #222;
                color: #222;
                display: flex;
                align-items: center;
                padding: 0 10px;
                gap: 10px
            }
            button {
                padding: 6px 10px;
                border: none;
                cursor: pointer;
                border-radius: 4px
            }
            #blocklyDiv {
                height: calc(100% - 50px);
                width: 100%
            }
        </style>
    </head>
    <body>
        <div id="header">
            <button onclick="exportCode()">Export</button>
            <button onclick="workspace.clear()">Clear</button>
            <span id="output"></span>
        </div>
        <div id="blocklyDiv"></div>
        <xml id="toolbox" style="display: none" src="src/toolbox.xml"></xml>
        <script src="src/main.js" type="module"></script>
    </body>
</html>
